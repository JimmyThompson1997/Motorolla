<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Pucky Cover</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell" data-view="feed">
      <header class="header">
        <nav id="pageTabs" class="page-tabs" aria-label="Pucky pages"></nav>
      </header>
      <button id="voiceStatus" class="voice-status voice-status-idle" type="button" data-voice-status aria-label="Turn state: idle"></button>

      <section id="routeTray" class="route-tray" aria-label="Home filters" hidden></section>
      <section id="feedRefresh" class="feed-refresh" aria-live="polite" aria-label="Pull to refresh Home feed" aria-hidden="true">
        <span class="feed-refresh-spinner" aria-hidden="true"></span>
        <span class="sr-only">Refreshing</span>
      </section>
      <section id="feed" class="feed" aria-label="Pucky reply feed"></section>
      <section id="detail" class="detail-panel" aria-hidden="true"></section>
      <section id="traceSheet" class="trace-sheet" aria-hidden="true"></section>
      <section id="speedOverlay" class="speed-overlay" aria-hidden="true"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
