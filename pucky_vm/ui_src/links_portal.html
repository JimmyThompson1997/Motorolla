<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pucky Links</title>
    <link rel="stylesheet" href="/links/portal.css">
  </head>
  <body>
    <main class="links-portal">
      <header class="links-portal-header">
        <div>
          <h1>Links</h1>
          <p>Search apps and connect them through Klavis.</p>
        </div>
        <a class="links-portal-return" id="returnLink" href="__RETURN_TO_ATTR__">Back to Pucky</a>
      </header>
      <section class="links-toolbar">
        <input id="searchInput" class="links-search" type="search" placeholder="Search apps" autocomplete="off" spellcheck="false">
        <div class="links-filters" role="tablist" aria-label="Link filters">
          <button class="links-filter is-active" data-filter="all" type="button">All</button>
          <button class="links-filter" data-filter="connected" type="button">Connected</button>
          <button class="links-filter" data-filter="needs_setup" type="button">Needs setup</button>
        </div>
      </section>
      <section id="portalNotice" class="links-notice" hidden></section>
      <section id="portalEmpty" class="links-empty" hidden>No matching apps.</section>
      <section id="portalList" class="links-list" aria-live="polite"></section>
    </main>
    <script>
      window.PuckyLinksConfig = {
        apiBaseUrl: __API_BASE_URL_JSON__,
        dashboardUrl: __DASHBOARD_URL_JSON__,
        returnTo: __RETURN_TO_JSON__,
        token: __TOKEN_JSON__
      };
    </script>
    <script src="/links/portal.js"></script>
  </body>
</html>
