<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Pucky Home Apps Mockup</title>
  <style>
    :root {
      --bg: #02060a;
      --panel: #000;
      --surface: #08111c;
      --tile: rgba(8, 17, 28, 0.88);
      --tile-soft: rgba(8, 17, 28, 0.62);
      --text: #f5f9ff;
      --muted: #b3c9e0;
      --blue: #58b2ff;
      --blue-soft: rgba(88, 178, 255, 0.26);
      --outline: #24374e;
      --safe-width: 992px;
      --safe-top: 50px;
      --safe-bottom: 102px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }

    body {
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }

    body.light {
      --bg: #f7fbff;
      --panel: #fafdff;
      --surface: #ffffff;
      --tile: rgba(255, 255, 255, 0.94);
      --tile-soft: rgba(250, 252, 255, 0.76);
      --text: #091220;
      --muted: #4d6482;
      --outline: #d6e2f2;
      --blue-soft: rgba(34, 111, 232, 0.2);
      --blue: #226fe8;
    }

    .device {
      position: relative;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 50% 38%, rgba(88, 178, 255, 0.09), transparent 30%),
        var(--bg);
    }

    .safe-card {
      position: absolute;
      top: var(--safe-top);
      bottom: var(--safe-bottom);
      left: 50%;
      width: min(var(--safe-width), calc(100vw - 64px));
      transform: translateX(-50%);
      overflow: hidden;
      background: var(--panel);
      border: 1px solid transparent;
      color: var(--text);
    }

    .safe-card.light-frame {
      border-color: rgba(34, 111, 232, 0.12);
    }

    .threads-button {
      position: absolute;
      top: 22px;
      right: 24px;
      z-index: 5;
    }

    .icon-button {
      width: 54px;
      height: 54px;
      border: 1px solid var(--blue-soft);
      border-radius: 15px;
      background: var(--tile);
      color: var(--text);
      display: grid;
      place-items: center;
    }

    .thread-mark,
    .thread-mark::before,
    .thread-mark::after {
      display: block;
      width: 22px;
      height: 2px;
      border-radius: 2px;
      background: currentColor;
      content: "";
    }

    .thread-mark::before {
      transform: translateY(-8px);
    }

    .thread-mark::after {
      transform: translateY(6px);
    }

    .home-halo {
      position: absolute;
      left: 50%;
      top: 40%;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background:
        radial-gradient(circle, rgba(88, 178, 255, 0.14) 0 28%, rgba(88, 178, 255, 0.08) 36%, transparent 64%),
        radial-gradient(circle, transparent 45%, rgba(88, 178, 255, 0.34) 49%, rgba(88, 178, 255, 0.08) 58%, transparent 68%);
    }

    .home-prompt {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(40% + 98px);
      color: var(--text);
      font-size: 24px;
      line-height: 1.1;
      text-align: center;
      font-weight: 400;
    }

    .home-grabber {
      position: absolute;
      left: 50%;
      bottom: 24px;
      width: 86px;
      height: 34px;
      transform: translateX(-50%);
      display: grid;
      place-items: center;
      color: var(--muted);
      opacity: 0.92;
    }

    .home-grabber::before {
      content: "";
      width: 64px;
      height: 4px;
      border-radius: 99px;
      background: currentColor;
      opacity: 0.72;
    }

    .drawer-peek {
      position: absolute;
      left: 50%;
      bottom: -74px;
      width: min(620px, calc(100% - 96px));
      height: 132px;
      transform: translateX(-50%);
      border: 1px solid var(--blue-soft);
      border-radius: 28px 28px 0 0;
      background: linear-gradient(180deg, var(--tile), transparent);
      opacity: 0.62;
    }

    .apps-shell {
      position: absolute;
      inset: 28px 28px 22px;
      display: flex;
      flex-direction: column;
    }

    .nav {
      height: 54px;
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      align-items: center;
    }

    .nav-title {
      margin: 0;
      color: var(--blue);
      font-size: 17px;
      font-weight: 700;
      text-align: center;
    }

    .nav-button {
      justify-self: start;
      width: 54px;
      height: 42px;
      border: 1px solid var(--blue-soft);
      border-radius: 14px;
      background: var(--tile);
      color: var(--text);
      display: grid;
      place-items: center;
      font-size: 22px;
      line-height: 1;
    }

    .apps-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: 148px;
      gap: 16px;
      align-content: start;
      padding: 18px 4px 0;
    }

    .app-tile {
      border: 1px solid var(--blue-soft);
      border-radius: 18px;
      background:
        linear-gradient(180deg, var(--tile), var(--tile-soft));
      color: var(--text);
      padding: 20px;
      display: grid;
      grid-template-columns: 62px 1fr;
      gap: 16px;
      align-items: center;
      text-align: left;
    }

    .app-icon {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 36% 28%, rgba(255, 255, 255, 0.42), transparent 30%),
        linear-gradient(135deg, rgba(88, 178, 255, 0.95), rgba(30, 94, 210, 0.86));
      color: #fff;
      font-weight: 800;
      font-size: 22px;
    }

    .app-icon.settings {
      background:
        radial-gradient(circle at 36% 28%, rgba(255, 255, 255, 0.36), transparent 30%),
        linear-gradient(135deg, #7d8bff, #226fe8);
    }

    .app-icon.threads {
      background:
        radial-gradient(circle at 36% 28%, rgba(255, 255, 255, 0.36), transparent 30%),
        linear-gradient(135deg, #31d4a8, #226fe8);
    }

    .app-title {
      margin: 0 0 7px;
      font-size: 20px;
      font-weight: 750;
      line-height: 1.05;
    }

    .app-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.25;
    }

    .settings-list {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: 82px;
      gap: 12px;
      padding: 18px 4px 0;
    }

    .setting-row {
      border: 1px solid var(--outline);
      border-radius: 16px;
      background: var(--tile);
      padding: 15px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .setting-label {
      margin: 0 0 5px;
      font-size: 15px;
      font-weight: 720;
      line-height: 1.05;
    }

    .setting-value {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.22;
    }
  </style>
</head>
<body>
  <div class="device">
    <section class="safe-card" data-mode="home">
      <button class="icon-button threads-button" type="button" aria-label="Threads">
        <span class="thread-mark"></span>
      </button>
      <div class="home-halo" aria-hidden="true"></div>
      <div class="home-prompt">Hey Pucky...</div>
      <div class="drawer-peek" aria-hidden="true"></div>
      <div class="home-grabber" aria-hidden="true"></div>
    </section>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const theme = params.get("theme") || "dark";
    const view = params.get("view") || "home";
    const card = document.querySelector(".safe-card");
    document.body.classList.toggle("light", theme === "light");
    card.classList.toggle("light-frame", theme === "light");

    const appTiles = `
      <div class="apps-shell">
        <div class="nav">
          <div class="nav-button" aria-hidden="true">^</div>
          <h1 class="nav-title">Apps</h1>
          <div></div>
        </div>
        <div class="apps-grid">
          <div class="app-tile">
            <div class="app-icon settings">S</div>
            <div>
              <p class="app-title">Settings</p>
              <p class="app-subtitle">Device, display, network, and app controls</p>
            </div>
          </div>
          <div class="app-tile">
            <div class="app-icon threads">T</div>
            <div>
              <p class="app-title">Threads</p>
              <p class="app-subtitle">Jump into active Project Vox work</p>
            </div>
          </div>
        </div>
      </div>`;

    const settings = `
      <div class="apps-shell">
        <div class="nav">
          <div class="nav-button" aria-hidden="true">^</div>
          <h1 class="nav-title">Settings</h1>
          <div></div>
        </div>
        <div class="settings-list">
          <div class="setting-row">
            <p class="setting-label">Theme</p>
            <p class="setting-value">${theme === "light" ? "Light mode active" : "Dark mode active"}</p>
          </div>
          <div class="setting-row">
            <p class="setting-label">Connection</p>
            <p class="setting-value">LiveKit and broker status</p>
          </div>
          <div class="setting-row">
            <p class="setting-label">App Details</p>
            <p class="setting-value">Open Android app settings</p>
          </div>
          <div class="setting-row">
            <p class="setting-label">Home App</p>
            <p class="setting-value">Open Android home settings</p>
          </div>
          <div class="setting-row">
            <p class="setting-label">Network</p>
            <p class="setting-value">Wi-Fi and internet panel</p>
          </div>
          <div class="setting-row">
            <p class="setting-label">Reload UI</p>
            <p class="setting-value">Refresh the portal shell</p>
          </div>
        </div>
      </div>`;

    const threads = `
      <div class="apps-shell">
        <div class="nav">
          <div class="nav-button" aria-hidden="true">^</div>
          <h1 class="nav-title">Threads</h1>
          <div></div>
        </div>
        <div class="settings-list">
          <div class="setting-row">
            <p class="setting-label">WebPage/WebRTC</p>
            <p class="setting-value">Current thread</p>
          </div>
          <div class="setting-row">
            <p class="setting-label">Codex CLI</p>
            <p class="setting-value">Ready</p>
          </div>
          <div class="setting-row">
            <p class="setting-label">Review call logs</p>
            <p class="setting-value">Idle</p>
          </div>
          <div class="setting-row">
            <p class="setting-label">Latency bottlenecks</p>
            <p class="setting-value">Idle</p>
          </div>
        </div>
      </div>`;

    if (view === "apps") {
      card.dataset.mode = "apps";
      card.innerHTML = appTiles;
    } else if (view === "settings") {
      card.dataset.mode = "settings";
      card.innerHTML = settings;
    } else if (view === "threads") {
      card.dataset.mode = "threads";
      card.innerHTML = threads;
    }
  </script>
</body>
</html>
