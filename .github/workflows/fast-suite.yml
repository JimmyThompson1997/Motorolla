name: fast-suite

on:
  push:
  pull_request:

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python tooling
        run: python -m pip install --upgrade pip pytest ruff
      - name: Ruff
        run: python -m tools.dev lint
      - name: Fast suite
        run: python -m tools.dev test-fast
