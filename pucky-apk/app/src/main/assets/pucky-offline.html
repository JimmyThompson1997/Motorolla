<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Pucky Offline</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: #02060a;
      color: #f5f9ff;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #02060a;
    }

    main {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 44px;
    }

    section {
      width: min(720px, calc(100vw - 88px));
      min-height: 390px;
      display: grid;
      align-content: center;
      gap: 18px;
      padding: 34px;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    h1 {
      margin: 0;
      color: #ff7878;
      font-size: 26px;
      line-height: 1.05;
      text-align: center;
    }

    p {
      margin: 0;
      color: #b3c9e0;
      font-size: 15px;
      line-height: 1.45;
      text-align: center;
      word-break: break-word;
    }

    button {
      min-height: 54px;
      border: 1px solid rgba(88, 178, 255, 0.32);
      border-radius: 18px;
      background: rgba(88, 178, 255, 0.1);
      color: #f5f9ff;
      font: inherit;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Pucky UI unavailable</h1>
      <p id="summary">The VM-hosted portal did not load.</p>
      <p>Restore the VM server or device network, then retry. This is a bundled recovery page, not the product UI.</p>
      <button type="button" id="retry">Retry portal</button>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const failedUrl = params.get("failed_url") || "unknown";
    const error = params.get("error") || "unknown";
    document.getElementById("summary").textContent = `Failed URL: ${failedUrl}\nError: ${error}`;
    document.getElementById("retry").addEventListener("click", () => {
      if (window.PuckyAndroid && window.PuckyAndroid.reloadUi) {
        window.PuckyAndroid.reloadUi();
      }
    });
  </script>
</body>
</html>
