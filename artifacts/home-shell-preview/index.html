<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Home Shell Preview</title>
  <style>
    :root {
      --bg: #05080f;
      --surface: rgba(13, 18, 28, 0.92);
      --surface-strong: rgba(18, 24, 38, 0.96);
      --surface-soft: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f5f7fb;
      --muted: rgba(235, 241, 250, 0.64);
      --accent: #6ea4ff;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.3);
      --dot: #8b95a5;
    }

    body[data-theme="light"] {
      --bg:
        radial-gradient(circle at 50% -12%, rgba(58, 132, 255, 0.08), transparent 34%),
        linear-gradient(180deg, #ffffff 0%, #f7f9fd 100%);
      --surface: rgba(255, 255, 255, 0.94);
      --surface-strong: rgba(255, 255, 255, 0.98);
      --surface-soft: rgba(16, 22, 36, 0.05);
      --border: rgba(16, 22, 36, 0.08);
      --text: #101624;
      --muted: rgba(16, 22, 36, 0.62);
      --accent: #226fe8;
      --shadow: 0 16px 38px rgba(15, 23, 42, 0.1);
      --dot: #98a1ae;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; font-family: Aptos, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); }
    body { display: flex; justify-content: center; padding: 24px; }
    .phone {
      position: relative;
      width: min(430px, 100%);
      min-height: 932px;
      border-radius: 32px;
      background: var(--bg);
      overflow: hidden;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.28);
      border: 1px solid var(--border);
    }
    .voice-dot {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      z-index: 3;
    }
    .voice-dot::before {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--dot);
    }
    .frame {
      min-height: 932px;
      padding: 20px 20px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-right: 56px;
      min-height: 44px;
    }
    .segmented {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      padding: 4px;
      gap: 4px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .segmented button,
    .tile,
    .back,
    .action,
    .list-row {
      appearance: none;
      border: 0;
      font: inherit;
      color: inherit;
      background: none;
      cursor: pointer;
    }
    .segmented button {
      min-height: 36px;
      padding: 0 14px;
      border-radius: 10px;
      color: var(--muted);
    }
    .segmented button.is-active {
      background: color-mix(in srgb, var(--accent) 16%, var(--surface-strong));
      color: var(--text);
    }
    .screen {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding-top: 14px;
    }
    .home-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 22px 18px;
      align-content: start;
    }
    .tile {
      display: grid;
      justify-items: center;
      gap: 9px;
      min-width: 0;
      text-align: center;
    }
    .icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: color-mix(in srgb, var(--accent-color) 14%, var(--surface-strong));
      color: var(--accent-color);
      border: 1px solid color-mix(in srgb, var(--accent-color) 18%, var(--border));
      box-shadow: var(--shadow);
    }
    .icon-wrap svg { width: 34px; height: 34px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .tile span:last-child { font-size: 13px; line-height: 1.08; font-weight: 720; }
    .page-header {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) 44px;
      gap: 8px;
      align-items: center;
      min-height: 54px;
    }
    .page-header h1 {
      margin: 0;
      text-align: center;
      font-size: 22px;
      line-height: 1.05;
    }
    .back,
    .action {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: color-mix(in srgb, var(--surface-strong) 84%, transparent);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .back svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2.2; }
    .card,
    .list-row {
      width: 100%;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      box-shadow: var(--shadow);
    }
    .list-row {
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      text-align: left;
    }
    .list-row strong,
    .card strong { display: block; font-size: 16px; line-height: 1.1; }
    .list-row small,
    .card small { color: var(--muted); font-size: 13px; line-height: 1.3; }
    .row-stack { min-width: 0; }
    .row-stack strong,
    .row-stack small { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .section-title {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.05em;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .hero-card {
      padding: 20px;
      display: grid;
      gap: 10px;
    }
    .hero-card h2,
    .hero-card p { margin: 0; }
    .hero-card p { color: var(--muted); }
    .pill {
      display: inline-grid;
      place-items: center;
      min-height: 36px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--accent) 14%, var(--surface-strong));
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      justify-self: start;
    }
    .task-groups { display: grid; gap: 12px; }
    .task-group { display: grid; gap: 8px; }
    .task-card { padding: 14px 16px; }
    .task-card + .task-card { margin-top: 8px; }
    .muted { color: var(--muted); }
  </style>
</head>
<body data-theme="light">
  <main class="phone">
    <div class="voice-dot" aria-hidden="true"></div>
    <div class="frame">
      <div class="toolbar">
        <div class="segmented" role="tablist" aria-label="Theme">
          <button type="button" data-theme-choice="light" class="is-active">Light</button>
          <button type="button" data-theme-choice="dark">Dark</button>
        </div>
      </div>
      <section id="screen" class="screen"></section>
    </div>
  </main>
  <script>
    const TILES = [
      { route: "inbox", label: "Inbox", icon: "mail", accent: "#8b5cf6", real: true },
      { route: "connect", label: "Connect", icon: "link", accent: "#5166d8", real: true },
      { route: "meetings", label: "Meetings", icon: "mic", accent: "#0a84ff", real: true },
      { route: "settings", label: "Settings", icon: "settings", accent: "#64748b", real: true },
      { route: "notes", label: "Notes", icon: "note", accent: "#f59e0b" },
      { route: "tasks", label: "Tasks", icon: "check", accent: "#22c55e" },
      { route: "calendar", label: "Calendar", icon: "calendar", accent: "#ff5b4d" },
      { route: "feed", label: "Feed", icon: "text", accent: "#1687ff" },
      { route: "projects", label: "Projects", icon: "folder", accent: "#17a6d9" },
      { route: "contacts", label: "Contacts", icon: "users", accent: "#f43f68" }
    ];

    const state = { theme: "light", route: "home" };
    const screen = document.getElementById("screen");

    function icon(name) {
      const paths = {
        mail: '<path d="M4 7h16v10H4z"/><path d="m4 8 8 6 8-6"/>',
        link: '<path d="M9 15 7 17a3 3 0 0 1-4-4l2-2a3 3 0 0 1 4 0"/><path d="m15 9 2-2a3 3 0 0 1 4 4l-2 2a3 3 0 0 1-4 0"/><path d="m8 12 8 0"/>',
        mic: '<path d="M12 4a3 3 0 0 1 3 3v4a3 3 0 1 1-6 0V7a3 3 0 0 1 3-3Z"/><path d="M7 11a5 5 0 0 0 10 0"/><path d="M12 16v4"/><path d="M9 20h6"/>',
        settings: '<circle cx="12" cy="12" r="3"/><path d="m19 12 2 0"/><path d="m3 12 2 0"/><path d="m12 19 0 2"/><path d="m12 3 0 2"/><path d="m17 17 1.5 1.5"/><path d="m5.5 5.5 1.5 1.5"/><path d="m17 7 1.5-1.5"/><path d="m5.5 18.5 1.5-1.5"/>',
        note: '<path d="M7 4h7l4 4v12H7z"/><path d="M14 4v4h4"/><path d="M10 13h5"/><path d="M10 17h3"/>',
        check: '<path d="M9 12.5 11.5 15 16 9.5"/><circle cx="12" cy="12" r="9"/>',
        calendar: '<rect x="4" y="6" width="16" height="14" rx="2"/><path d="M8 4v4"/><path d="M16 4v4"/><path d="M4 10h16"/>',
        text: '<path d="M6 7h12"/><path d="M6 11h12"/><path d="M6 15h8"/><rect x="4" y="4" width="16" height="16" rx="3"/>',
        folder: '<path d="M4 8h5l2 2h9v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><path d="M4 8V6a2 2 0 0 1 2-2h3l2 2h7a2 2 0 0 1 2 2"/>',
        users: '<circle cx="9" cy="9" r="3"/><circle cx="16.5" cy="8.5" r="2.5"/><path d="M4.5 18a4.5 4.5 0 0 1 9 0"/><path d="M14 17a3.5 3.5 0 0 1 6 0"/>'
      };
      return `<svg viewBox="0 0 24 24" aria-hidden="true">${paths[name] || paths.note}</svg>`;
    }

    function renderHome() {
      return `
        <div class="home-grid">
          ${TILES.map(tile => `
            <button class="tile" data-route="${tile.route}">
              <span class="icon-wrap" style="--accent-color:${tile.accent}">${icon(tile.icon)}</span>
              <span>${tile.label}</span>
            </button>
          `).join("")}
        </div>
      `;
    }

    function row(iconName, accent, title, detail) {
      return `
        <button class="list-row">
          <span class="icon-wrap" style="--accent-color:${accent};width:42px;height:42px;border-radius:14px">${icon(iconName)}</span>
          <span class="row-stack"><strong>${title}</strong><small>${detail}</small></span>
          <span class="muted">›</span>
        </button>
      `;
    }

    function pageHeader(title) {
      return `
        <header class="page-header">
          <button class="back" type="button" data-route="home" aria-label="Back">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <h1>${title}</h1>
          <div></div>
        </header>
      `;
    }

    function renderPage(route) {
      const pages = {
        inbox: `
          ${pageHeader("Inbox")}
          <div class="list">
            ${row("mail", "#8b5cf6", "Partner rollout launch readiness", "Unread · Audio · Reply thread")}
            ${row("text", "#1687ff", "Build status digest", "HTML page · Artifact viewer")}
            ${row("mail", "#f43f68", "Design feedback thread", "Read · Transcript open")}
          </div>
        `,
        connect: `
          ${pageHeader("Connect")}
          <div class="card hero-card">
            <h2>Canonical Links surface</h2>
            <p>Search, connected apps, and handoff behavior would mount here without changing the underlying route logic.</p>
            <span class="pill">Search + app open proof</span>
          </div>
          <div class="list">
            ${row("link", "#5166d8", "Google Drive", "Connected")}
            ${row("link", "#5166d8", "Slack", "Connected")}
            ${row("link", "#5166d8", "Linear", "Auth required")}
          </div>
        `,
        meetings: `
          ${pageHeader("Meetings")}
          <div class="list">
            ${row("mic", "#0a84ff", "Meeting processing failed", "Today · Detail + audio")}
            ${row("mic", "#0a84ff", "Customer call recap", "Today · Transcript + attachments")}
            ${row("mic", "#0a84ff", "Weekly sync", "Yesterday · Summary view")}
          </div>
        `,
        settings: `
          ${pageHeader("Settings")}
          <div class="card hero-card">
            <h2>Appearance lives here</h2>
            <p>The real implementation uses the canonical selector-card surface and persists the theme immediately.</p>
            <span class="pill">Dark / Light toggle</span>
          </div>
          <div class="list">
            ${row("settings", "#64748b", "Appearance", "Dark or Light")}
            ${row("settings", "#64748b", "Default audio speed", "1.0x")}
            ${row("settings", "#64748b", "Wake word", "Enabled")}
          </div>
        `,
        notes: `
          ${pageHeader("Notes")}
          <div class="list">
            ${row("note", "#f59e0b", "Q4 hiring plan", "Pinned · 2h ago")}
            ${row("note", "#f59e0b", "Customer briefing", "Yesterday")}
          </div>
        `,
        tasks: `
          ${pageHeader("Tasks")}
          <div class="task-groups">
            <div class="task-group"><h2 class="section-title">DO</h2><div class="card task-card"><strong>Launch checklist</strong><small>Due today</small></div></div>
            <div class="task-group"><h2 class="section-title">DO SOON</h2><div class="card task-card"><strong>Budget follow-up</strong><small>Tomorrow</small></div></div>
            <div class="task-group"><h2 class="section-title">OVERDUE</h2><div class="card task-card"><strong>Finalize roadmap</strong><small>2 days overdue</small></div></div>
            <div class="task-group"><h2 class="section-title">DONE</h2><div class="card task-card"><strong>Publish rollout note</strong><small>Completed</small></div></div>
          </div>
        `,
        calendar: `${pageHeader("Calendar")}<div class="card hero-card"><h2>Today, June 8th</h2><p>Timeline, meetings, and meeting-detail mock flows stay conceptual here.</p></div>`,
        feed: `${pageHeader("Feed")}<div class="card hero-card"><h2>Conceptual feed</h2><p>This remains intentionally separate from the real Inbox/Home feed path.</p></div>`,
        projects: `${pageHeader("Projects")}<div class="card hero-card"><h2>Projects mock</h2><p>List, detail, and create flows can live here without touching canonical feed behavior.</p></div>`,
        contacts: `${pageHeader("Contacts")}<div class="card hero-card"><h2>Contacts mock</h2><p>List, detail, and create states use the same shell framing.</p></div>`
      };
      return pages[route] || renderHome();
    }

    function render() {
      screen.innerHTML = state.route === "home" ? renderHome() : renderPage(state.route);
    }

    document.body.addEventListener("click", (event) => {
      const themeButton = event.target.closest("[data-theme-choice]");
      if (themeButton) {
        state.theme = themeButton.getAttribute("data-theme-choice");
        document.body.dataset.theme = state.theme;
        document.querySelectorAll("[data-theme-choice]").forEach((button) => {
          button.classList.toggle("is-active", button === themeButton);
        });
        return;
      }
      const routeButton = event.target.closest("[data-route]");
      if (routeButton) {
        state.route = routeButton.getAttribute("data-route") || "home";
        render();
      }
    });

    render();
  </script>
</body>
</html>
